services:
  backend:
    container_name: apihub-coderabbit-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - DEV_MODE=true
      - FRONTEND_URL=https://teamocode.teamolab.com
      - JWT_SECRET=apihub-coderabbit-jwt-secret-32chars!
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-demo_github_client_id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-demo_github_client_secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_demo}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_demo}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-price_pro_demo}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE:-price_enterprise_demo}
      - BASE_PATH=/apihubcoderabbit
    networks:
      - default
      - survey_default
    restart: unless-stopped

  frontend:
    container_name: apihub-coderabbit-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=http://apihub-coderabbit-backend:8000
    depends_on:
      - backend
    networks:
      - default
      - survey_default
    restart: unless-stopped

networks:
  survey_default:
    name: codepulse-survey_default
    external: true
