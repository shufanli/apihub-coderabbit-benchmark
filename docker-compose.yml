version: "3.8"

services:
  apihub:
    build: .
    ports:
      - "8000:8000"
      - "3000:3000"
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-demo_github_client_id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-demo_github_client_secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_demo}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-whsec_demo}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-price_pro_demo}
      - STRIPE_PRICE_ENTERPRISE=${STRIPE_PRICE_ENTERPRISE:-price_enterprise_demo}
      - JWT_SECRET=${JWT_SECRET:-production_jwt_secret}
      - FRONTEND_URL=https://teamocode.teamolab.com
      - BASE_PATH=/apihubcoderabbit
      - NEXT_PUBLIC_API_URL=https://teamocode.teamolab.com
      - NEXT_PUBLIC_BASE_PATH=/apihubcoderabbit
    restart: unless-stopped
